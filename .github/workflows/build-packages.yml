name: Build Packages

on:
  workflow_dispatch:

# Does not run Terraform. Infra: local/terraform workflow — spec/documents/CI_CD_AND_SECRETS.md

# Shared client config (Cognito + API) — add under repo Settings → Secrets and variables → Actions:
#   EXPO_PUBLIC_USER_POOL_ID, EXPO_PUBLIC_USER_POOL_CLIENT_ID,
#   EXPO_PUBLIC_OAUTH_DOMAIN, EXPO_PUBLIC_API_ENDPOINT
# Android: build-android also pushes these to EAS "preview" before eas build so cloud builds match GitHub.

jobs:
  build-web:
    runs-on: ubuntu-latest
    # S3 deploy: ENABLE_S3_DEPLOY=true; optional vars: AWS_REGION, AWS_S3_PREFIX (no leading slash)
    # Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_WEB_BUCKET
    env:
      EXPO_PUBLIC_USER_POOL_ID: ${{ secrets.EXPO_PUBLIC_USER_POOL_ID }}
      EXPO_PUBLIC_USER_POOL_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_USER_POOL_CLIENT_ID }}
      EXPO_PUBLIC_OAUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_OAUTH_DOMAIN }}
      EXPO_PUBLIC_API_ENDPOINT: ${{ secrets.EXPO_PUBLIC_API_ENDPOINT }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx expo export --platform web
      - name: Verify web export output
        run: test -d dist && ls -la dist
      - name: Configure AWS credentials
        if: ${{ vars.ENABLE_S3_DEPLOY == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      - name: Deploy dist/ to S3
        if: ${{ vars.ENABLE_S3_DEPLOY == 'true' }}
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_WEB_BUCKET }}
          S3_PREFIX: ${{ vars.AWS_S3_PREFIX }}
        run: |
          set -euo pipefail
          if [ -z "${S3_BUCKET:-}" ]; then
            echo "::error::AWS_S3_WEB_BUCKET secret is empty."
            exit 1
          fi
          P=""
          if [ -n "${S3_PREFIX:-}" ]; then
            P="${S3_PREFIX#/}"
            P="${P%/}"
          fi
          DEST="s3://${S3_BUCKET}/${P:+$P/}"
          echo "Sync destination: ${DEST}"
          # Full sync + prune removed files (--delete safe with full dist/ tree)
          aws s3 sync dist/ "${DEST}" --delete --only-show-errors \
            --cache-control "public, max-age=86400"
          # Refresh HTML with no-cache so clients load new JS/CSS references after deploy
          find dist -type f -name '*.html' -print0 | while IFS= read -r -d '' f; do
            key="${f#dist/}"
            [ -n "$P" ] && key="${P}/${key}"
            aws s3 cp "$f" "s3://${S3_BUCKET}/${key}" \
              --cache-control "public, max-age=0, must-revalidate" \
              --content-type "text/html; charset=utf-8" \
              --metadata-directive REPLACE
          done
          # Tab icon: short CDN cache so new favicons show after deploy (query ?v= in HTML helps too)
          if [ -f dist/favicon.ico ]; then
            FKEY="favicon.ico"
            [ -n "$P" ] && FKEY="${P}/favicon.ico"
            aws s3 cp dist/favicon.ico "s3://${S3_BUCKET}/${FKEY}" \
              --cache-control "public, max-age=300" \
              --content-type "image/x-icon" \
              --metadata-directive REPLACE
          fi

  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
      EXPO_PUBLIC_USER_POOL_ID: ${{ secrets.EXPO_PUBLIC_USER_POOL_ID }}
      EXPO_PUBLIC_USER_POOL_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_USER_POOL_CLIENT_ID }}
      EXPO_PUBLIC_OAUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_OAUTH_DOMAIN }}
      EXPO_PUBLIC_API_ENDPOINT: ${{ secrets.EXPO_PUBLIC_API_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Push EXPO_PUBLIC_* from GitHub secrets to EAS (preview)
        run: |
          set -euo pipefail
          for var in EXPO_PUBLIC_USER_POOL_ID EXPO_PUBLIC_USER_POOL_CLIENT_ID EXPO_PUBLIC_OAUTH_DOMAIN EXPO_PUBLIC_API_ENDPOINT; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Repository secret $var is empty. Add it under Settings → Secrets and variables → Actions."
              exit 1
            fi
          done
          for var in EXPO_PUBLIC_USER_POOL_ID EXPO_PUBLIC_USER_POOL_CLIENT_ID EXPO_PUBLIC_OAUTH_DOMAIN EXPO_PUBLIC_API_ENDPOINT; do
            npx eas-cli@latest env:create \
              --name "$var" \
              --value "${!var}" \
              --environment preview \
              --visibility plaintext \
              --non-interactive \
              --force
            echo "Synced $var to EAS preview environment."
          done
      - run: npx eas-cli@latest build --platform android --non-interactive --profile preview

